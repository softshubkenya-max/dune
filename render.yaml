services:
  - type: web
    name: dune-omega
    env: python
    region: oregon

    buildCommand: pip install -r requirements.txt
    startCommand: python ui/server.py

    healthCheckPath: /api/status

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

      - key: DUNE_HOST
        value: "0.0.0.0"

      - key: PORT
        value: "8080"

     
